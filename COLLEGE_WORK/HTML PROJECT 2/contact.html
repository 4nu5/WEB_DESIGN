<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EcoStruct | Contact</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav>
        <a href="index.html" class="logo">EcoStruct</a>
        <ul>
            <li><a href="index.html">Home</a></li>
            <li><a href="about.html">About SDG 9</a></li>
            <li><a href="features.html">Key Features</a></li>
            <li><a href="contact.html" class="active">Contact</a></li>
        </ul>
    </nav>

    <header class="page-header">
        <h1>Get Involved</h1>
        <p>Connect with us to discuss sustainable infrastructure solutions.</p>
    </header>

    <main class="container">
        <div class="text-box" style="max-width: 600px; margin: 0 auto;">
            <h2>Send a Message</h2>
            <form action="#" method="POST">
                <div class="form-group">
                    <label for="name">Full Name</label>
                    <input type="text" id="name" name="name" required placeholder="Enter your name">
                </div>
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" name="email" required placeholder="Enter your email">
                </div>
                <div class="form-group">
                    <label for="message">Your Proposal or Inquiry</label>
                    <textarea id="message" name="message" required placeholder="How can we improve industrial innovation?"></textarea>
                </div>
                <button type="submit" class="btn">Submit Inquiry</button>
            </form>
        </div>
    </main>

    <footer>
        <p> 2026 EcoStruct | Sunway College</p>
    </footer>
</body>
</html>
